# apphosting.yaml
# Firebase App Hosting Configuration for sc-vault-1b5ac

runConfig:
  cpu: 1
  memoryMiB: 512

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL_SECRET
  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET_SECRET
  - variable: NEXTAUTH_URL
    value: "https://sc-vault.network"
  - variable: DISCORD_CLIENT_ID
    value: "placeholder"
  - variable: DISCORD_CLIENT_SECRET
    secret: DISCORD_CLIENT_SECRET_SECRET
  - variable: GOOGLE_CLIENT_ID
    value: "placeholder"
  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET_SECRET
